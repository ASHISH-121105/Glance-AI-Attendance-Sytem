{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GLANCE{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="site-wrapper">

    <header class="site-header">
        <div class="header-inner">
            <a href="{% url 'home_page' %}" class="header-logo-group">
                <div class="mini-logo">
                    <div class="mini-ring"></div>
                    <div class="mini-core"></div>
                </div>
                <span class="brand-text">GLANCE</span>
            </a>
            
            {% block header_actions %}
            {% endblock %}
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer" style="margin-top: 80px; padding: 30px 0; border-top: 1px solid rgba(0, 243, 255, 0.15); text-align: center; color: var(--text-muted); font-size: 0.9rem;">
        <div style="display: flex; flex-direction: column; gap: 12px; align-items: center;">

            <p style="margin: 0; letter-spacing: 0.5px;">
                &copy; 2026 GLANCE Core. AI Attendance Verification Engine.
            </p>

            <p style="margin: 0; font-size: 0.8rem; opacity: 0.6; letter-spacing: 1px;">
                Developed by Ashish Kumar Yadav
            </p>
            
        </div>
    </footer>

</body>
</html>
